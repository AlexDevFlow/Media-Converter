name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # Both gir versions: PyGObject 3.50+ wheels require
          # girepository-2.0 to build, but PyInstaller's gi hook discovers
          # GTK/Cairo/Pango/Adw libraries via gobject-introspection-1.0.pc
          # (from the 1.0 variant). Without both, the bundle is missing
          # the GTK4 + libadwaita stack and the binary silently exits when
          # Adw.Application.run() can't find a GTK runtime.
          sudo apt-get install -y \
            libgirepository1.0-dev \
            libgirepository-2.0-dev \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            libgtk-4-dev \
            libadwaita-1-dev \
            libcairo2-dev \
            pkg-config \
            python3-gi

      - name: Install Python dependencies
        run: |
          # Pin PyGObject < 3.50: the 3.50 release switched to
          # libgirepository-2.0 and changed Application.run() semantics in
          # a way that makes Adw.Application.run() return 0 without firing
          # the activate signal in PyInstaller-frozen apps. 3.48.x matches
          # the version used by working local development builds.
          pip install pyinstaller pyyaml 'PyGObject<3.50'

      - name: Build binary
        run: python -m PyInstaller fileconverter.spec --noconfirm --clean

      - name: Verify binary runs
        run: ./dist/fileconverter --version

      - name: Verify bundled presets load
        run: ./dist/fileconverter --self-check

      # The steps above only prove the binary starts. This one proves it can
      # actually convert, which is a different thing: the bundle ships its own
      # HarfBuzz/Fontconfig and the loader path used to leak into the system
      # ffmpeg/magick it spawns (#6). There is no display on the runner, so
      # this also exercises the headless fallback.
      - name: Convert real files with the frozen binary
        run: |
          sudo apt-get install -y ffmpeg imagemagick
          mkdir -p /tmp/conv && cd /tmp/conv
          ffmpeg -hide_banner -loglevel error -y -f lavfi -i testsrc=d=1:s=64x64:r=10 \
            -f lavfi -i sine=d=1 -c:v libx264 -pix_fmt yuv420p -c:a aac -shortest clip.mp4
          ffmpeg -hide_banner -loglevel error -y -f lavfi -i testsrc=d=1:s=64x64:r=10 \
            -pix_fmt yuv420p silent.mkv
          convert -size 64x64 xc:blue pic.png

          B="$GITHUB_WORKSPACE/dist/fileconverter"
          "$B" --conversion-preset "To Mp3" clip.mp4 --verbose
          "$B" --conversion-preset "To Mkv" clip.mp4 --verbose
          "$B" --conversion-preset "To Jpg" pic.png --verbose
          for f in clip.mp3 clip.mkv pic.jpg; do
            [ -s "$f" ] || { echo "::error::the frozen binary produced no $f"; exit 1; }
            echo "  ok: $f ($(stat -c%s "$f") bytes)"
          done

          # A silent video converted to audio must fail with a message that
          # says why, and must exit non-zero.
          if "$B" --conversion-preset "To Mp3" silent.mkv 2>err.txt; then
            echo "::error::converting a silent video to MP3 reported success"; exit 1
          fi
          grep -qi "no audio track" err.txt \
            || { echo "::error::unhelpful error: $(cat err.txt)"; exit 1; }
          echo "  ok: silent video rejected with '$(cat err.txt)'"

      - name: Verify the file-manager integration installs
        run: |
          ./dist/fileconverter --install
          test -f "$HOME/.local/bin/fileconverter" || { echo "::error::no launcher"; exit 1; }
          test -f "$HOME/.local/bin/fileconverter-pick" || { echo "::error::no picker"; exit 1; }
          test -s "$HOME/.config/fileconverter/settings.yaml" || { echo "::error::no config"; exit 1; }
          # Menus embed an absolute path, or the file manager can't launch them.
          grep -q '^Exec="/' "$HOME/.local/share/applications/fileconverter-settings.desktop"
          "$HOME/.local/bin/fileconverter" --version
          ./dist/fileconverter --uninstall
          test ! -e "$HOME/.local/bin/fileconverter" || { echo "::error::uninstall left the launcher"; exit 1; }
          echo "  ok: install + uninstall are clean"

      - name: Package release tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PKG_DIR="fileconverter-${VERSION}"
          mkdir -p "${PKG_DIR}"
          cp dist/fileconverter "${PKG_DIR}/fileconverter"
          chmod +x "${PKG_DIR}/fileconverter"

          cat > "${PKG_DIR}/install.sh" <<'EOF'
          #!/usr/bin/env bash
          # File Converter for Linux — installer wrapper
          # Runs the bundled binary with --install to set up context menu integration.
          set -e
          DIR="$(cd "$(dirname "$0")" && pwd)"
          BIN="${DIR}/fileconverter"
          if [ ! -f "${BIN}" ]; then
              echo "Error: 'fileconverter' binary not found next to install.sh" >&2
              exit 1
          fi
          chmod +x "${BIN}"
          exec "${BIN}" --install
          EOF
          chmod +x "${PKG_DIR}/install.sh"

          cat > "${PKG_DIR}/README.txt" <<'EOF'
          File Converter for Linux
          ========================

          Quick install (terminal):

              ./install.sh

          Or run the binary directly — first run triggers setup automatically:

              ./fileconverter

          To remove the integration later:

              ./fileconverter --uninstall

          Project page: https://github.com/AlexDevFlow/Media-Converter
          EOF

          TARBALL="fileconverter-${VERSION}-linux-x86_64.tar.gz"
          tar -czf "${TARBALL}" "${PKG_DIR}"
          sha256sum "${TARBALL}" > "${TARBALL}.sha256"
          ls -la "${TARBALL}" "${TARBALL}.sha256"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            fileconverter-*-linux-x86_64.tar.gz
            fileconverter-*-linux-x86_64.tar.gz.sha256
            dist/fileconverter

  build-macos:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Compile-check Python sources
        run: python3 -m compileall -q fileconverter

      - name: Compile-check native Swift sources
        # The installer compiles these on the user's machine; make sure the
        # release ships sources that build with a current Xcode toolchain.
        run: |
          swiftc -O -parse-as-library -module-name FileConverterUI \
            fileconverter/ui/native/FileConverterUI.swift -o /tmp/fcui
          swiftc -O -parse-as-library -module-name FileConverterHost \
            fileconverter/ui/native/HostApp.swift -o /tmp/fchost
          swiftc -O -parse-as-library -module-name FileConverterSync \
            fileconverter/ui/native/FinderSyncExt.swift -o /tmp/fcsync \
            -framework FinderSync -Xlinker -e -Xlinker _NSExtensionMain

      - name: Install media tools
        run: |
          export HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALL_CLEANUP=1
          brew install ffmpeg imagemagick ghostscript

      - name: Run test suite
        # Integration tests against the real backends; LibreOffice-dependent
        # tests skip cleanly (the cask is too heavy for CI).
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet --disable-pip-version-check pyyaml pytest
          .venv/bin/python -m pytest tests/ -q

      - name: Verify bundled presets load
        run: PYTHONPATH=. .venv/bin/python -m fileconverter --self-check

      # install.sh on a machine that isn't the developer's: builds the Swift UI
      # and the Finder extension from scratch, sets up the venv and launchers.
      - name: Install like a user would
        run: |
          ./install.sh
          test -x "$HOME/.local/bin/fileconverter" || { echo "::error::no launcher"; exit 1; }
          test -x "$HOME/.local/share/fileconverter/bin/fileconverter-ui" \
            || { echo "::error::the native UI did not build"; exit 1; }
          test -d "$HOME/Applications/File Converter.app" \
            || { echo "::error::File Converter.app was not built"; exit 1; }
          test -s "$HOME/.local/share/fileconverter/menu.json" \
            || { echo "::error::no menu.json for the Finder submenu"; exit 1; }
          "$HOME/.local/bin/fileconverter" --self-check

      - name: Convert real files with the installed tool
        run: |
          mkdir -p /tmp/conv && cd /tmp/conv
          ffmpeg -hide_banner -loglevel error -y -f lavfi -i testsrc=d=1:s=64x64:r=10 \
            -f lavfi -i sine=d=1 -c:v libx264 -pix_fmt yuv420p -c:a aac -shortest clip.mp4
          ffmpeg -hide_banner -loglevel error -y -f lavfi -i testsrc=d=1:s=64x64:r=10 \
            -pix_fmt yuv420p silent.mkv
          magick -size 64x64 xc:blue pic.png

          B="$HOME/.local/bin/fileconverter"
          "$B" --conversion-preset "To Mp3" clip.mp4 --verbose
          "$B" --conversion-preset "To Jpg" pic.png --verbose
          for f in clip.mp3 pic.jpg; do
            [ -s "$f" ] || { echo "::error::produced no $f"; exit 1; }
            echo "  ok: $f ($(stat -f%z "$f") bytes)"
          done

          if "$B" --conversion-preset "To Mp3" silent.mkv 2>err.txt; then
            echo "::error::a silent video converted to MP3 reported success"; exit 1
          fi
          grep -qi "no audio track" err.txt \
            || { echo "::error::unhelpful error: $(cat err.txt)"; exit 1; }
          echo "  ok: silent video rejected with '$(cat err.txt)'"

      - name: Uninstall cleanly
        run: |
          "$HOME/.local/bin/fileconverter" --uninstall
          test ! -e "$HOME/Applications/File Converter.app" \
            || { echo "::error::uninstall left the app behind"; exit 1; }
          test ! -e "$HOME/.local/bin/fileconverter" \
            || { echo "::error::uninstall left the launcher behind"; exit 1; }
          echo "  ok: nothing left behind"

      - name: Package macOS tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PKG_DIR="fileconverter-${VERSION}-macos"
          mkdir -p "${PKG_DIR}"
          cp -R fileconverter "${PKG_DIR}/"
          cp install.sh install-macos.sh LICENSE "${PKG_DIR}/"
          find "${PKG_DIR}" -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true

          cat > "${PKG_DIR}/README.txt" <<'EOF'
          File Converter for macOS
          ========================

          Requirements:
            - Xcode Command Line Tools:  xcode-select --install
            - Homebrew (https://brew.sh) for the media tools

          Quick install (terminal):

              ./install.sh

          This sets up the Finder right-click submenu ("File Converter"),
          compiles the native progress/settings UI, and installs
          File Converter.app in ~/Applications. Missing media tools
          (ffmpeg, imagemagick, ghostscript) are offered via Homebrew.

          To remove everything later:

              fileconverter --uninstall

          Project page: https://github.com/AlexDevFlow/Media-Converter
          EOF

          TARBALL="fileconverter-${VERSION}-macos.tar.gz"
          tar -czf "${TARBALL}" "${PKG_DIR}"
          shasum -a 256 "${TARBALL}" > "${TARBALL}.sha256"
          ls -la "${TARBALL}" "${TARBALL}.sha256"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            fileconverter-*-macos.tar.gz
            fileconverter-*-macos.tar.gz.sha256

  release:
    runs-on: ubuntu-24.04
    needs: [build-linux, build-macos]

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            fileconverter-*-linux-x86_64.tar.gz
            fileconverter-*-linux-x86_64.tar.gz.sha256
            fileconverter-*-macos.tar.gz
            fileconverter-*-macos.tar.gz.sha256
            dist/fileconverter
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Install

            ### Linux

            1. Download `fileconverter-${{ github.ref_name }}-linux-x86_64.tar.gz` below.
            2. Open a terminal in your downloads folder and run:

            ```bash
            tar -xzf fileconverter-${{ github.ref_name }}-linux-x86_64.tar.gz
            cd fileconverter-${{ github.ref_name }}
            ./install.sh
            ```

            The installer detects your file manager (Nautilus / Nemo / Dolphin / Thunar / PCManFM)
            and sets up the right-click "File Converter" submenu.

            ### macOS

            1. Download `fileconverter-${{ github.ref_name }}-macos.tar.gz` below.
            2. Open a terminal in your downloads folder and run:

            ```bash
            tar -xzf fileconverter-${{ github.ref_name }}-macos.tar.gz
            cd fileconverter-${{ github.ref_name }}-macos
            ./install.sh
            ```

            The installer builds the Finder right-click submenu ("File Converter"),
            the native SwiftUI progress window, and File Converter.app.
            Requires the Xcode Command Line Tools and Homebrew.

            To remove later (both platforms):

            ```bash
            fileconverter --uninstall
            ```

            **Arch Linux:** `yay -S fileconverter` (or `fileconverter-git` for the latest `main`).

            **Power users:** the raw Linux `fileconverter` binary is also attached if you want to manage placement yourself.

            ---

  # Publishes the stable AUR package on each tagged release. No-op (skipped)
  # until the AUR_SSH_PRIVATE_KEY secret is configured — see
  # packaging/aur/README.md for the one-time setup.
  publish-aur:
    runs-on: ubuntu-24.04
    needs: release
    if: ${{ !contains(github.ref_name, '-') }}   # skip prereleases
    steps:
      - uses: actions/checkout@v4

      - name: Check whether the AUR key is configured
        id: gate
        run: echo "enabled=${{ secrets.AUR_SSH_PRIVATE_KEY != '' }}" >> "$GITHUB_OUTPUT"

      - name: Set pkgver from the tag
        if: steps.gate.outputs.enabled == 'true'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" packaging/aur/fileconverter/PKGBUILD

      - name: Publish fileconverter to the AUR
        if: steps.gate.outputs.enabled == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: fileconverter
          pkgbuild: packaging/aur/fileconverter/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"
          # Downloads the source tarball and fills in sha256sums; also
          # regenerates .SRCINFO before pushing.
          updpkgsums: true

      - name: AUR publish skipped
        if: steps.gate.outputs.enabled != 'true'
        run: echo "AUR_SSH_PRIVATE_KEY not set — skipping AUR publish (see packaging/aur/README.md)."
