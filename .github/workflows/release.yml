name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository-2.0-dev \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            libcairo2-dev \
            pkg-config \
            python3-gi

      - name: Install Python dependencies
        run: |
          pip install pyinstaller pyyaml PyGObject

      - name: Build binary
        run: python -m PyInstaller fileconverter.spec --noconfirm --clean

      - name: Verify binary runs
        run: ./dist/fileconverter --version

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/fileconverter
          generate_release_notes: true
