version: 2
max_simultaneous_conversions: 2
exit_when_done: true
exit_delay_seconds: 3

# Reusable input lists (YAML anchors keep this file readable).
_anchors:
  video: &video_inputs
    [3gp, 3gpp, avi, bik, f4v, flv, m2ts, m4v, mkv, mov, mp4, mts,
     mxf, mpg, mpeg, ogv, qt, rm, ts, vob, webm, wmv]

  audio: &audio_inputs
    [aac, aif, aiff, ape, dff, dsf, flac, m4a, m4b, mka, mp3, mpc,
     oga, ogg, opus, wav, wma, wv]

  audio_lossless: &audio_lossless_inputs
    [aif, aiff, ape, dff, dsf, flac, mka, wav, wma, wv]

  image: &image_inputs
    [arw, avif, bmp, cr2, dds, dng, exr, heic, ico, jfif, jp2, jpg,
     jpeg, nef, pbm, pgm, png, ppm, psd, raf, svg, tga, tif, tiff,
     webp, xcf]

  doc_text: &doc_text_inputs
    [doc, docx, epub, html, odt, pages, rtf, txt]

  doc_sheet: &doc_sheet_inputs
    [csv, numbers, ods, xls, xlsx]

  doc_pres: &doc_pres_inputs
    [key, odp, ppt, pptx]

  doc_all: &doc_all_inputs
    [csv, doc, docx, epub, html, key, numbers, odp, odt, pages,
     ppt, pptx, rtf, txt, xls, xlsx]

presets:
  # ── Video ──
  - name: "To Mp4"
    output_type: mp4
    input_types: &video_or_gif
      [gif, 3gp, 3gpp, avi, bik, f4v, flv, m2ts, m4v, mkv, mov, mp4,
       mts, mxf, mpg, mpeg, ogv, qt, rm, ts, vob, webm, wmv]
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      enable_audio: true
      video_quality: 30
      video_encoding_speed: medium
      video_scale: 1.0
      video_rotation: 0
      audio_bitrate: 155

  - name: "To Mp4 (low quality)"
    output_type: mp4
    input_types: *video_or_gif
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      enable_audio: true
      video_quality: 20
      video_encoding_speed: medium
      video_scale: 1.0
      video_rotation: 0
      audio_bitrate: 96

  - name: "To Mkv"
    output_type: mkv
    input_types: *video_or_gif
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      enable_audio: true
      video_quality: 30
      video_encoding_speed: medium
      video_scale: 1.0
      video_rotation: 0
      audio_bitrate: 155

  - name: "To Mov"
    output_type: mov
    input_types: *video_or_gif
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      enable_audio: true
      video_quality: 30
      video_encoding_speed: medium
      video_scale: 1.0
      video_rotation: 0
      audio_bitrate: 155

  - name: "To Webm"
    output_type: webm
    input_types: *video_or_gif
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      enable_audio: true
      video_quality: 40
      video_scale: 1.0
      video_rotation: 0
      audio_bitrate: 160

  - name: "To Ogv"
    output_type: ogv
    input_types: *video_or_gif
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      enable_audio: true
      video_quality: 8
      video_scale: 1.0
      video_rotation: 0
      audio_bitrate: 160

  - name: "To Avi"
    output_type: avi
    input_types: *video_or_gif
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      enable_audio: true
      video_quality: 27
      video_scale: 1.0
      video_rotation: 0
      audio_bitrate: 190

  - name: "To Mp4 (H.265)"
    output_type: mp4
    input_types: *video_or_gif
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      video_codec: hevc
      enable_audio: true
      video_quality: 28
      video_encoding_speed: medium
      video_scale: 1.0
      video_rotation: 0
      audio_bitrate: 155

  - name: "To Mkv (H.265)"
    output_type: mkv
    input_types: *video_or_gif
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      video_codec: hevc
      enable_audio: true
      video_quality: 28
      video_encoding_speed: medium
      video_scale: 1.0
      video_rotation: 0
      audio_bitrate: 155

  - name: "To Mp4 (AV1)"
    output_type: mp4
    input_types: *video_or_gif
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      video_codec: av1
      enable_audio: true
      video_quality: 33
      video_encoding_speed: fast
      video_scale: 1.0
      video_rotation: 0
      audio_bitrate: 155

  - name: "To Mov (ProRes)"
    output_type: mov
    input_types: *video_or_gif
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      video_codec: prores
      prores_profile: 3
      enable_audio: true
      video_scale: 1.0
      video_rotation: 0

  # ── GIF ──
  - name: "To Gif"
    output_type: gif
    input_types: &gif_inputs
      [xcf, gif, 3gp, 3gpp, avi, bik, f4v, flv, m2ts, m4v, mkv, mov,
       mp4, mts, mxf, mpg, mpeg, ogv, qt, rm, ts, vob, webm, wmv,
       arw, avif, bmp, cr2, dds, dng, exr, heic, ico, jfif, jp2, jpg,
       jpeg, nef, pbm, pgm, png, ppm, psd, raf, svg, tga, tif, tiff,
       webp]
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      video_scale: 1.0
      video_rotation: 0
      video_frames_per_second: 15

  - name: "To Gif (low quality)"
    output_type: gif
    input_types: *gif_inputs
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      video_scale: 0.75
      video_rotation: 0
      video_frames_per_second: 10

  # ── Audio ──
  - name: "To Mp3"
    output_type: mp3
    input_types: &audio_or_video
      [aac, aif, aiff, ape, dff, dsf, flac, m4a, m4b, mka, mp3, mpc,
       oga, ogg, opus, wav, wma, wv,
       3gp, 3gpp, avi, bik, f4v, flv, m2ts, m4v, mkv, mov, mp4, mts,
       mxf, mpg, mpeg, ogv, qt, rm, ts, vob, webm, wmv]
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      audio_encoding_mode: mp3vbr
      audio_bitrate: 190
      audio_channel_count: 0

  - name: "To Mp3 (low quality)"
    output_type: mp3
    input_types: *audio_or_video
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      audio_encoding_mode: mp3vbr
      audio_bitrate: 100
      audio_channel_count: 0

  - name: "To Aac"
    output_type: aac
    input_types: *audio_or_video
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      audio_bitrate: 155
      audio_channel_count: 0

  - name: "To M4a"
    output_type: m4a
    input_types: *audio_or_video
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      audio_bitrate: 155
      audio_channel_count: 0

  - name: "To Ogg"
    output_type: ogg
    input_types: *audio_or_video
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      audio_bitrate: 160
      audio_channel_count: 0

  - name: "To Opus"
    output_type: opus
    input_types: *audio_or_video
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      audio_bitrate: 128
      audio_channel_count: 0

  - name: "To Flac"
    output_type: flac
    input_types: *audio_lossless_inputs
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      audio_channel_count: 0

  - name: "To Wav"
    output_type: wav
    input_types: *audio_or_video
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      audio_encoding_mode: wav16
      audio_channel_count: 0

  - name: "To Aiff"
    output_type: aiff
    input_types: *audio_or_video
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      audio_encoding_mode: aiff16
      audio_channel_count: 0

  - name: "To M4a (Apple Lossless)"
    output_type: m4a
    input_types: *audio_lossless_inputs
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      audio_codec: alac
      audio_channel_count: 0

  - name: "To Wma"
    output_type: wma
    input_types: *audio_or_video
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      audio_bitrate: 160
      audio_channel_count: 0

  - name: "To Ac3"
    output_type: ac3
    input_types: *audio_or_video
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      audio_bitrate: 192
      audio_channel_count: 0

  # ── Image ──
  - name: "To Png"
    output_type: png
    input_types: &image_or_pdf
      [arw, avif, bmp, cr2, dds, dng, exr, gif, heic, ico, jfif, jp2,
       jpg, jpeg, nef, pbm, pgm, png, ppm, psd, raf, svg, tga, tif,
       tiff, webp, xcf, pdf]
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      image_scale: 1.0
      image_rotation: 0

  - name: "To Jpg"
    output_type: jpg
    input_types: *image_or_pdf
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      image_quality: 85
      image_scale: 1.0
      image_rotation: 0

  - name: "To Webp"
    output_type: webp
    input_types: *image_or_pdf
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      image_quality: 85
      image_scale: 1.0
      image_rotation: 0

  - name: "To Avif"
    output_type: avif
    input_types: *image_or_pdf
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      image_quality: 80
      image_scale: 1.0
      image_rotation: 0

  - name: "To Tiff"
    output_type: tiff
    input_types: *image_or_pdf
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      image_scale: 1.0
      image_rotation: 0

  - name: "To Bmp"
    output_type: bmp
    input_types: *image_or_pdf
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      image_scale: 1.0
      image_rotation: 0

  - name: "To Ico"
    output_type: ico
    input_types: *image_or_pdf
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      image_scale: 1.0
      image_rotation: 0

  - name: "To Jp2"
    output_type: jp2
    input_types: *image_or_pdf
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      image_quality: 85
      image_scale: 1.0
      image_rotation: 0

  - name: "To Tga"
    output_type: tga
    input_types: *image_or_pdf
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      image_scale: 1.0
      image_rotation: 0

  # ── Document ──
  - name: "To Pdf"
    output_type: pdf
    input_types:
      [csv, doc, docx, epub, html, key, numbers, odp, ods, odt, pages,
       ppt, pptx, rtf, txt, xls, xlsx,
       arw, avif, bmp, cr2, dds, dng, exr, gif, heic, ico, jfif, jp2,
       jpg, jpeg, nef, pbm, pgm, png, ppm, psd, raf, svg, tga, tif,
       tiff, webp, xcf]
    input_post_action: none
    output_template: "(p)(f)"
    settings:
      image_scale: 1.0

  - name: "To Docx"
    output_type: docx
    input_types: *doc_text_inputs
    input_post_action: none
    output_template: "(p)(f)"

  - name: "To Odt"
    output_type: odt
    input_types: *doc_text_inputs
    input_post_action: none
    output_template: "(p)(f)"

  - name: "To Xlsx"
    output_type: xlsx
    input_types: *doc_sheet_inputs
    input_post_action: none
    output_template: "(p)(f)"

  - name: "To Ods"
    output_type: ods
    input_types: *doc_sheet_inputs
    input_post_action: none
    output_template: "(p)(f)"

  - name: "To Pptx"
    output_type: pptx
    input_types: *doc_pres_inputs
    input_post_action: none
    output_template: "(p)(f)"

  - name: "To Odp"
    output_type: odp
    input_types: *doc_pres_inputs
    input_post_action: none
    output_template: "(p)(f)"

  - name: "To Epub"
    output_type: epub
    input_types: *doc_text_inputs
    input_post_action: none
    output_template: "(p)(f)"

  - name: "To Rtf"
    output_type: rtf
    input_types: *doc_text_inputs
    input_post_action: none
    output_template: "(p)(f)"

  - name: "To Txt"
    output_type: txt
    input_types: *doc_text_inputs
    input_post_action: none
    output_template: "(p)(f)"

  - name: "To Html"
    output_type: html
    input_types: *doc_text_inputs
    input_post_action: none
    output_template: "(p)(f)"

  - name: "To Csv"
    output_type: csv
    input_types: *doc_sheet_inputs
    input_post_action: none
    output_template: "(p)(f)"
